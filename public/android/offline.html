<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>KINTA Offline</title>
    <meta name="theme-color" content="#173c25" />
    <link rel="stylesheet" href="/android/app.css" />
  </head>
  <body>
    <div class="android-shell">
      <main class="android-main">
        <section class="android-panel">
          <article class="android-card android-offline-card">
            <p class="eyebrow">Offline</p>
            <h1>KINTA is waiting for a connection.</h1>
            <p class="android-copy">
              KINTA is ready here, but live marketplace data needs the
              server again before it can refresh.
            </p>
            <a class="android-button android-button-primary" href="/android/index.html">
              Retry App
            </a>
          </article>
        </section>
      </main>
    </div>
  </body>
</html>
