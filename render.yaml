services:
  - type: web
    name: kinta
    env: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health
    disk:
      name: kinta-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PORT
        value: 3000
      - key: HOST
        value: 0.0.0.0
      - key: DB_PATH
        value: /var/data/kinta.db
